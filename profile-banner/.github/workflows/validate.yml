name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt || true

      - name: Validate SVG
        run: python tools/validate_svg.py

      - name: Validate project structure
        run: python tools/validate_structure.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Build distribution
        run: python tools/build_banner.py

      - name: Optimize distribution
        run: python tools/optimize_svg.py
